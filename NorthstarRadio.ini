# ============================================================
# NorthstarRadio.ini — GTA III
# Поместите этот файл в папку: GTA3\scripts\NorthstarRadio.ini
# ============================================================

[SETTINGS]

# Включить звук проезжающих машин с радио (1 = да, 0 = нет)
AmbientRadio=0

# Когда 1 — станция не меняется при пересадке из машины в машину
RadioAutoTune=0

# Когда 0 — отключает SCM-хуки (для тотальных конверсий с
# изменённым main.scm, которые крашатся при перехвате опкодов)
ScriptIntegration=1

# ============================================================
[CONTROLS]
# ============================================================

# Клавиша смены станции (виртуальный код клавиши Windows).
# 82 = R,  78 = N,  187 = ] (правая скобка)
RadioSwitchNext=82

# Кнопка геймпада (XInput bitmask). 0 = отключено.
# Примеры: 4096 = Y (Xbox),  8192 = X,  16384 = A,  32768 = B
RadioSwitchNextPad=0

# ============================================================
[STATIONS]
# Формат: Название станции | путь к файлу относительно папки GTA3
#
# Файлы идут в том же порядке, в каком они идут в самой игре
# (индексы 0–7). Плагин будет синхронизировать "эфирное время"
# так же, как это делала оригинальная GTA III.
#
# ВАЖНО: проверьте, что имена файлов совпадают с тем, что
# лежит в вашей папке audio\. Они могут немного отличаться
# в зависимости от версии игры (Steam, CD, Classic).
# ============================================================

Lips 106              | audio\LIPS106.ADF
Double Clef FM        | audio\DBLCLEF.ADF
Head Radio            | audio\HEAD.ADF
Flashback 95.6        | audio\FLASH.ADF
Chatterbox FM         | audio\CHAT.ADF
Rise FM               | audio\RISE.ADF
Game Radio FM         | audio\GAME.ADF
MSX FM                | audio\MSX.ADF

# ---- Дополнительные/кастомные станции ----------------------
# Раскомментируйте и добавьте свои MP3/ADF ниже.
# Они получат индексы 8, 9, 10 и т.д.
# Пути — относительно папки GTA3.
#
# My Custom Station | audio\custom\mystation.mp3

# ============================================================
[STARTOFFSET]
# Открывает станцию на конкретном месте при старте новой игры.
# Полезно, чтобы игра начиналась с нужного трека, как в оригинале.
# Формат: Название станции | М:СС  (или просто секунды)
#
# Chatterbox FM | 0:00
# ============================================================

# ============================================================
[VEHICLES]
# Привязка модели машины к станции.
# Формат: ID модели | Название станции (как в [STATIONS])
#
# Найти ID моделей: откройте vehicles.ide в папке data\
# или используйте утилиту Sanny Builder (F3 → vehicle IDs).
#
# Примеры для GTA III:
#  90 = Mafia Sentinal → можно поставить Double Clef FM
# 116 = FBI Car
# 119 = Police
#
# 90  | Double Clef FM
# 104 | Flashback 95.6
# ============================================================

# ============================================================
[NORADIO]
# Модели машин БЕЗ радио (например, мотоциклы, лодки).
# Одна строка — один ID модели.
#
# GTA III IDs для справки:
# 103 = PCJ-600 (мотоцикл)
# 108 = Freeway (мотоцикл)
# 130 = Speeder (лодка)
# 137 = Reefer  (лодка)
#
# 103
# 108
# 130
# 137
# ============================================================
