name: Build NorthstarRadio (GTA III)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Compile ASI (x86 Release)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Clone plugin-sdk
        run: git clone --depth=1 https://github.com/DK22Pac/plugin-sdk.git deps/plugin-sdk

      - name: Clone safetyhook
        run: git clone --depth=1 --recurse-submodules https://github.com/cursey/safetyhook.git deps/safetyhook

      # Find CRGBA.h wherever it is, then copy to shared/
      - name: Fix CRGBA.h include path
        shell: pwsh
        run: |
          Write-Host "=== Searching for CRGBA.h ==="
          $found = Get-ChildItem -Recurse -Filter "CRGBA.h" deps/plugin-sdk -ErrorAction SilentlyContinue |
                   Select-Object -First 1
          if ($found) {
            Write-Host "Found: $($found.FullName)"
            Copy-Item $found.FullName "deps/plugin-sdk/shared/CRGBA.h" -Force
            Write-Host "Copied to deps/plugin-sdk/shared/CRGBA.h"
          } else {
            Write-Host "CRGBA.h not found — listing plugin-sdk root structure:"
            Get-ChildItem -Recurse deps/plugin-sdk -Filter "*.h" |
              Select-Object -First 40 -ExpandProperty FullName
            exit 1
          }

      - name: Configure CMake
        run: |
          cmake -B build `
                -A Win32 `
                -DCMAKE_BUILD_TYPE=Release `
                "-DCMAKE_CXX_FLAGS=/DGTAIII /DWIN32_LEAN_AND_MEAN /DNOMINMAX /D_CRT_SECURE_NO_WARNINGS" `
                "-DCMAKE_C_FLAGS=/DGTAIII"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify output
        shell: pwsh
        run: |
          if (Test-Path "build/Release/NorthstarRadio.asi") {
            $size = (Get-Item "build/Release/NorthstarRadio.asi").Length
            Write-Host "OK: NorthstarRadio.asi created ($size bytes)"
          } else {
            Write-Error "NorthstarRadio.asi not found"
            exit 1
          }

      - name: Upload NorthstarRadio.asi
        uses: actions/upload-artifact@v4
        with:
          name: NorthstarRadio-GTA3
          path: build/Release/NorthstarRadio.asi
          retention-days: 90
          if-no-files-found: error
