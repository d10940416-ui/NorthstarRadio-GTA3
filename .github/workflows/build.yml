name: Build NorthstarRadio (GTA III)

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Compile ASI (x86 Release)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Clone plugin-sdk
        run: git clone --depth=1 https://github.com/DK22Pac/plugin-sdk.git deps/plugin-sdk

      - name: Clone safetyhook
        run: git clone --depth=1 --recurse-submodules https://github.com/cursey/safetyhook.git deps/safetyhook

      - name: Copy game_III headers into shared/
        shell: pwsh
        run: |
          $src = "deps/plugin-sdk/plugin_III/game_III"
          $dst = "deps/plugin-sdk/shared"
          if (Test-Path $src) {
            $files = Get-ChildItem "$src" -Filter "*.h"
            foreach ($f in $files) {
              Copy-Item $f.FullName "$dst/$($f.Name)" -Force
            }
            Write-Host "Copied $($files.Count) headers (force)"
          }

      # CRGBA.h is NOT inside game_III in this version of plugin-sdk.
      # We create it from scratch so Color.h can find it.
      - name: Create missing CRGBA.h
        shell: pwsh
        run: |
          $content = @'
#pragma once
class CRGBA {
public:
    unsigned char red, green, blue, alpha;
    CRGBA() = default;
    CRGBA(unsigned char r, unsigned char g, unsigned char b, unsigned char a = 255)
        : red(r), green(g), blue(b), alpha(a) {}
    bool operator==(const CRGBA& o) const {
        return red==o.red && green==o.green && blue==o.blue && alpha==o.alpha;
    }
    bool operator!=(const CRGBA& o) const { return !(*this == o); }
};
'@
          Set-Content "deps/plugin-sdk/shared/CRGBA.h" $content -Force
          Write-Host "Created shared/CRGBA.h"

      - name: Configure CMake
        run: cmake -B build -A Win32

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify output
        shell: pwsh
        run: |
          if (Test-Path "build/Release/NorthstarRadio.asi") {
            $size = (Get-Item "build/Release/NorthstarRadio.asi").Length
            Write-Host "OK: NorthstarRadio.asi ($size bytes)"
          } else {
            Write-Error "NorthstarRadio.asi not found"
            exit 1
          }

      - name: Upload NorthstarRadio.asi
        uses: actions/upload-artifact@v4
        with:
          name: NorthstarRadio-GTA3
          path: build/Release/NorthstarRadio.asi
          retention-days: 90
          if-no-files-found: error
