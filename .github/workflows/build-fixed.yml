name: Build NorthstarRadio (GTA III)

# Запускается при каждом push в main, и вручную кнопкой Run workflow
on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Compile ASI (x86 Release)
    runs-on: windows-latest

    steps:
      # ── 1. Скачать ваш репозиторий ──────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Настроить MSBuild (нужен для plugin-sdk) ─────────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── 3. Скачать plugin-sdk ───────────────────────────────
      - name: Clone plugin-sdk
        shell: pwsh
        run: |
          git clone --depth=1 https://github.com/DK22Pac/plugin-sdk.git deps/plugin-sdk

      # ── 4. Собрать plugin.lib (GTA III) из plugin-sdk ───────
      #    plugin-sdk поставляется с готовыми .vcxproj файлами.
      #    Если путь к .sln изменился в новых версиях SDK —
      #    проверьте папку deps/plugin-sdk/ и скорректируйте.
      - name: Build plugin-sdk GTA III lib
        run: |
          $sln = Get-ChildItem -Recurse -Filter "plugin_III*.vcxproj" `
                   deps/plugin-sdk | Select-Object -First 1 -ExpandProperty FullName
          if ($sln) {
            msbuild "$sln" `
              /p:Configuration=Release `
              /p:Platform=Win32 `
              /p:PlatformToolset=v143 `
              /m
          } else {
            Write-Warning "plugin_III.vcxproj не найден — пропускаем"
          }
        shell: pwsh

      # ── 5. Скачать safetyhook (с зависимостью Zydis) ────────
      - name: Clone safetyhook
        shell: pwsh
        run: |
          git clone --depth=1 --recurse-submodules https://github.com/cursey/safetyhook.git deps/safetyhook

      # ── 6. Настроить CMake (32-бит) ─────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build `
                -A Win32 `
                -DCMAKE_BUILD_TYPE=Release

      # ── 7. Компиляция ────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 8. Проверить что файл появился ───────────────────────
      - name: Verify output
        run: |
          if (Test-Path "build/Release/NorthstarRadio.asi") {
            $size = (Get-Item "build/Release/NorthstarRadio.asi").Length
            Write-Host "✓ NorthstarRadio.asi создан ($size байт)"
          } else {
            Write-Error "✗ NorthstarRadio.asi не найден!"
            exit 1
          }
        shell: pwsh

      # ── 9. Загрузить готовый .asi как артефакт ───────────────
      #    После завершения сборки скачать можно на вкладке
      #    Actions → выбрать запуск → раздел Artifacts внизу.
      - name: Upload NorthstarRadio.asi
        uses: actions/upload-artifact@v4
        with:
          name: NorthstarRadio-GTA3
          path: build/Release/NorthstarRadio.asi
          retention-days: 90
          if-no-files-found: error
